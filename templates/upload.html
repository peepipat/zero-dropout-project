<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>อัปโหลดข้อมูลนักเรียน - Zero Dropout</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; padding: 50px; }
        .upload-container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .upload-box { border: 2px dashed #3498db; padding: 30px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { background-color: #ebf5fb; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>📊 นำเข้าข้อมูลนักเรียน</h2>
        <p>กรุณาอัปโหลดไฟล์ Excel (.xlsx) ของชั้นเรียน</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-box">
                <input type="file" name="file" accept=".xlsx, .xls">
            </div>
            <button type="submit">เริ่มวิเคราะห์ความเสี่ยง</button>
        </form>
    </div>
</body>
</html>
