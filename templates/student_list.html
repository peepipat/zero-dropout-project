<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>รายชื่อนักเรียน - Zero Dropout</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 15px; overflow: hidden; }
        .header { padding: 20px; background: #1a73e8; color: white; }
        .student-item { display: flex; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #eee; text-decoration: none; color: inherit; align-items: center; }
        .student-item:hover { background: #f9f9f9; }
        .risk-red { border-left: 10px solid #e74c3c; }
        .risk-orange { border-left: 10px solid #f39c12; }
        .risk-green { border-left: 10px solid #2ecc71; }
        .status-tag { padding: 4px 12px; border-radius: 20px; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/dashboard" style="color: white; text-decoration: none;">← กลับ</a>
            <h2 style="margin: 10px 0 0 0;">รายชื่อนักเรียน ชั้น 6/1</h2>
        </div>
        
        <a href="/student_detail" class="student-item risk-red">
            <span>1. เด็กชาย สมหวัง ตั้งใจเรียน</span>
            <span class="status-tag" style="background:#e74c3c;">เสี่ยงสูง (แดง)</span>
        </a>
        <a href="/student_detail" class="student-item risk-orange">
            <span>2. เด็กหญิง มานี มีปู</span>
            <span class="status-tag" style="background:#f39c12;">เริ่มเสี่ยง (ส้ม)</span>
        </a>
        <a href="/student_detail" class="student-item risk-green">
            <span>3. เด็กชาย ปิติ ยินดี</span>
            <span class="status-tag" style="background:#2ecc71;">ปกติ (เขียว)</span>
        </a>
    </div>
</body>
</html>
