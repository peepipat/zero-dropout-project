<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประวัติการใส่ข้อมูล - Zero Dropout</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .btn-delete { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" style="text-decoration:none; color:#1a73e8;">← กลับสู่ Dashboard</a>
        <h2>📂 ประวัติการอัปโหลดไฟล์</h2>
        <table>
            <thead>
                <tr>
                    <th>วันที่อัปโหลด</th>
                    <th>ชื่อไฟล์</th>
                    <th>ห้อง</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>02/03/2026</td>
                    <td>student_list_6_1.xlsx</td>
                    <td>6/1</td>
                    <td><button class="btn-delete">ลบข้อมูล</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
